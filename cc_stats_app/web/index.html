<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Statistics</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1>CC Statistics</h1>
            <div class="controls">
                <div class="select-wrapper">
                    <select id="project-select">
                        <option value="">All Projects</option>
                    </select>
                </div>
                <div class="time-buttons">
                    <button class="time-btn active" data-days="1">Today</button>
                    <button class="time-btn" data-days="7">7d</button>
                    <button class="time-btn" data-days="30">30d</button>
                    <button class="time-btn" data-days="0">All</button>
                </div>
            </div>
        </div>

        <!-- Metric Cards -->
        <div class="metrics-grid" id="metrics">
            <div class="metric-card" data-type="messages">
                <div class="metric-label">Instructions</div>
                <div class="metric-value" id="val-messages">—</div>
                <div class="metric-sub" id="sub-messages"></div>
            </div>
            <div class="metric-card" data-type="tools">
                <div class="metric-label">Tool Calls</div>
                <div class="metric-value" id="val-tools">—</div>
                <div class="metric-sub" id="sub-tools"></div>
            </div>
            <div class="metric-card" data-type="duration">
                <div class="metric-label">Active Time</div>
                <div class="metric-value" id="val-duration">—</div>
                <div class="metric-sub" id="sub-duration"></div>
            </div>
            <div class="metric-card" data-type="code">
                <div class="metric-label">Code Changes</div>
                <div class="metric-value" id="val-code">—</div>
                <div class="metric-sub" id="sub-code"></div>
            </div>
            <div class="metric-card" data-type="tokens">
                <div class="metric-label">Tokens</div>
                <div class="metric-value" id="val-tokens">—</div>
                <div class="metric-sub" id="sub-tokens"></div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <div class="chart-title">Tool Usage</div>
                <div class="chart-container">
                    <canvas id="chart-tools"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Time Distribution</div>
                <div class="chart-container">
                    <canvas id="chart-time"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Code Changes by Language</div>
                <div class="chart-container">
                    <canvas id="chart-langs"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <div class="chart-title">Token Distribution</div>
                <div class="chart-container">
                    <canvas id="chart-tokens"></canvas>
                </div>
            </div>
        </div>

        <!-- Daily Trend -->
        <div class="trend-section">
            <div class="trend-card">
                <div class="chart-title">Daily Activity Trend</div>
                <div class="trend-container">
                    <canvas id="chart-trend"></canvas>
                </div>
            </div>
        </div>

        <!-- Session info -->
        <div class="session-info" id="session-info"></div>
    </div>

    <script src="js/vendor/chart.min.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CC Statistics</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #10141a;
        --panel: #161b22;
        --border: #30363d;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #58a6ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        display: grid;
        grid-template-rows: auto 1fr;
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
      }

      .status {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 6px;
        background: #21262d;
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        padding: 7px 10px;
      }

      button:hover {
        border-color: var(--accent);
      }

      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: var(--bg);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>CC Statistics</h1>
          <div class="status" data-status>Starting API...</div>
        </div>
        <div class="actions">
          <button type="button" data-open-dashboard>Open Dashboard</button>
          <button type="button" data-restart-api>Restart API</button>
        </div>
      </header>
      <iframe data-dashboard-frame title="CC Statistics Dashboard"></iframe>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
